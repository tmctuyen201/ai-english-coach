<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI English Coach — Conversation Room</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0B0B14;
  --surface: #151521;
  --surface-hover: #1C1C2E;
  --border: #252538;
  --primary: #7C5CFC;
  --primary-glow: rgba(124,92,252,0.3);
  --secondary: #00D4FF;
  --success: #34D399;
  --warning: #FBBF24;
  --error: #F87171;
  --text: #FFFFFF;
  --text-body: rgba(255,255,255,0.8);
  --text-muted: rgba(255,255,255,0.5);
  --radius-card: 16px;
  --radius-btn: 12px;
  --radius-pill: 100px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-body);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── ANIMATED MESH BACKGROUND ── */
.mesh-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}
.mesh-bg::before, .mesh-bg::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.15;
  animation: meshFloat 20s ease-in-out infinite;
}
.mesh-bg::before {
  width: 600px; height: 600px;
  background: var(--primary);
  top: -200px; left: -100px;
}
.mesh-bg::after {
  width: 500px; height: 500px;
  background: var(--secondary);
  bottom: -200px; right: -100px;
  animation-delay: -10s;
  animation-direction: reverse;
}
.mesh-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.08;
  animation: meshFloat 25s ease-in-out infinite;
}
.mesh-orb:nth-child(1) {
  width: 400px; height: 400px;
  background: #A78BFA;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation-delay: -5s;
}

@keyframes meshFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(50px, -30px) scale(1.05); }
  50% { transform: translate(-30px, 50px) scale(0.95); }
  75% { transform: translate(30px, 30px) scale(1.02); }
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 100px; }

/* ── LOBBY ── */
#lobby {
  position: relative;
  z-index: 1;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-y: auto;
  padding: 24px 20px 40px;
  animation: fadeIn 0.5s ease;
}
#lobby.hidden { display: none; }

.lobby-header {
  text-align: center;
  margin-bottom: 8px;
}
.app-logo {
  font-size: 40px;
  margin-bottom: 4px;
  display: block;
  animation: logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
.app-name {
  font-size: 22px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.app-subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ── TOPIC PREVIEW ── */
.topic-preview {
  width: 100%;
  max-width: 480px;
  background: linear-gradient(135deg, rgba(124,92,252,0.1), rgba(0,212,255,0.05));
  border: 1px solid rgba(124,92,252,0.2);
  border-radius: var(--radius-card);
  padding: 16px 20px;
  margin-bottom: 20px;
  display: none;
  animation: slideUp 0.3s ease;
}
.topic-preview.visible { display: flex; align-items: center; gap: 14px; }
.topic-preview-icon { font-size: 40px; flex-shrink: 0; }
.topic-preview-info { flex: 1; }
.topic-preview-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.topic-preview-desc {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.4;
}
.topic-preview-ai {
  font-size: 12px;
  color: var(--primary);
  margin-top: 6px;
  font-weight: 600;
}

/* ── SECTION HEADING ── */
.section-heading {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 16px;
  text-align: center;
}

/* ── TOPIC GRID ── */
.topic-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  width: 100%;
  max-width: 480px;
  margin-bottom: 24px;
}
@media (max-width: 400px) {
  .topic-grid { grid-template-columns: 1fr; }
}

.topic-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  padding: 16px;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}
.topic-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius-card);
  padding: 1px;
  background: linear-gradient(135deg, transparent, transparent);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  transition: background 0.3s ease;
  pointer-events: none;
}
.topic-card:hover::before {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
}
.topic-card:hover {
  background: var(--surface-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.topic-card.selected {
  border-color: var(--primary);
  box-shadow: 0 0 0 1px var(--primary), 0 0 24px var(--primary-glow);
  background: rgba(124,92,252,0.08);
}
.topic-card.selected::before {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
}

.topic-icon { font-size: 36px; margin-bottom: 8px; display: block; }
.topic-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}
.topic-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.topic-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.level-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: var(--radius-pill);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.level-A1 { background: rgba(52,211,153,0.15); color: var(--success); }
.level-A2 { background: rgba(59,130,246,0.15); color: #60A5FA; }
.level-B1 { background: rgba(251,191,36,0.15); color: var(--warning); }
.level-B2 { background: rgba(124,92,252,0.15); color: var(--primary); }
.level-B1-B2 { background: rgba(167,139,250,0.15); color: #A78BFA; }

.duration-badge {
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 3px;
}
.duration-badge::before {
  content: '⏱';
  font-size: 10px;
}

/* ── NAME INPUT ── */
.name-input-wrapper {
  width: 100%;
  max-width: 340px;
  margin-bottom: 16px;
  position: relative;
}
.name-input-prefix {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
  pointer-events: none;
  opacity: 0.5;
}
.name-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-btn);
  padding: 14px 16px 14px 46px;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.name-input::placeholder { color: var(--text-muted); }
.name-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}

/* ── START BUTTON ── */
.start-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 40px;
  background: linear-gradient(135deg, var(--primary), #9F7AEA);
  border: none;
  border-radius: var(--radius-pill);
  font-family: var(--font);
  font-size: 17px;
  font-weight: 700;
  color: white;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 4px 20px var(--primary-glow);
  position: relative;
  overflow: hidden;
}
.start-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1));
  opacity: 0;
  transition: opacity 0.25s;
}
.start-btn:hover::before { opacity: 1; }
.start-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(124,92,252,0.5);
}
.start-btn:active { transform: translateY(0); }
.start-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: none !important;
}
.start-btn-icon { font-size: 20px; }

/* ── CONVERSATION ROOM ── */
#room {
  display: none;
  flex-direction: column;
  height: 100%;
  position: relative;
  z-index: 1;
  animation: fadeSlideIn 0.4s ease;
}
#room.active { display: flex; }

/* ── TOP BAR ── */
.top-bar {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  background: rgba(11,11,20,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  gap: 12px;
  flex-shrink: 0;
  z-index: 10;
}
.back-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-body);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.2s;
  flex-shrink: 0;
}
.back-btn:hover { background: var(--surface-hover); color: var(--text); }
.top-bar-info {
  flex: 1;
  min-width: 0;
}
.top-bar-topic {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.top-bar-level {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 1px;
}
.turn-counter {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  padding: 5px 12px;
  white-space: nowrap;
}
.end-btn {
  padding: 7px 14px;
  background: rgba(248,113,113,0.12);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: var(--radius-pill);
  color: var(--error);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.end-btn:hover {
  background: rgba(248,113,113,0.2);
  border-color: var(--error);
}

/* ── PROGRESS BAR ── */
.progress-bar-track {
  height: 3px;
  background: var(--border);
  flex-shrink: 0;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  width: 0%;
  transition: width 0.5s ease;
  border-radius: 0 2px 2px 0;
}

/* ── CHAT AREA ── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

/* AI Message */
.msg-ai {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  max-width: 85%;
  animation: msgSlideUp 0.25s ease;
}
.msg-ai-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}
.msg-ai-body {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.msg-ai-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px 16px 16px 16px;
  padding: 12px 16px;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-body);
  position: relative;
}
.msg-ai-actions {
  display: flex;
  gap: 4px;
  padding-left: 4px;
}
.msg-ai-action {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.msg-ai-action:hover {
  background: var(--surface);
  color: var(--text-body);
}

/* Student Message */
.msg-student {
  display: flex;
  justify-content: flex-end;
  max-width: 85%;
  align-self: flex-end;
  animation: msgSlideUp 0.25s ease;
}
.msg-student-bubble {
  background: linear-gradient(135deg, var(--primary), #A78BFA);
  border-radius: 16px 16px 4px 16px;
  padding: 12px 16px;
  font-size: 14px;
  line-height: 1.6;
  color: white;
}

/* Typing Indicator */
.typing-indicator {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
}
.typing-indicator.visible { display: flex; }
.typing-dots {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px 16px 16px 16px;
  padding: 12px 16px;
}
.typing-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  animation: typingBounce 1.4s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
.typing-text {
  font-size: 12px;
  color: var(--text-muted);
  font-style: italic;
}
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* ── VOICE INPUT AREA ── */
.voice-area {
  padding: 12px 16px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.live-transcript {
  font-size: 13px;
  color: var(--secondary);
  text-align: center;
  min-height: 20px;
  max-width: 80%;
  word-break: break-word;
  opacity: 0;
  transition: opacity 0.2s;
  font-weight: 500;
}
.live-transcript.visible { opacity: 1; }

/* Mic Button */
.mic-btn {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  z-index: 2;
}
.mic-btn-inner {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), #9F7AEA);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  color: white;
  position: relative;
  z-index: 2;
  box-shadow: 0 4px 20px var(--primary-glow);
  transition: all 0.3s ease;
}
.mic-btn.idle .mic-btn-inner {
  animation: micBreathe 3s ease-in-out infinite;
}
.mic-btn.listening .mic-btn-inner {
  background: linear-gradient(135deg, var(--secondary), #38BDF8);
  box-shadow: 0 0 30px rgba(0,212,255,0.4);
}
.mic-btn.processing .mic-btn-inner {
  background: var(--surface);
  border: 2px solid var(--primary);
}

/* Waveform Rings */
.wave-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: 2px solid var(--secondary);
  opacity: 0;
  pointer-events: none;
  z-index: 1;
}
.mic-btn.listening .wave-ring { animation: waveExpand 2s ease-out infinite; }
.wave-ring:nth-child(1) { animation-delay: 0s; }
.wave-ring:nth-child(2) { animation-delay: 0.5s; }
.wave-ring:nth-child(3) { animation-delay: 1s; }

@keyframes waveExpand {
  0% { width: 72px; height: 72px; opacity: 0.5; }
  100% { width: 140px; height: 140px; opacity: 0; }
}
@keyframes micBreathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}

/* Spinner */
.spinner {
  width: 28px;
  height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: none;
}
.mic-btn.processing .spinner { display: block; }
.mic-btn.processing .mic-icon { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

.mic-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
}

/* Text Mode */
.text-input-row {
  display: none;
  width: 100%;
  max-width: 480px;
  gap: 8px;
  align-items: center;
}
.text-input-row.active { display: flex; }
.text-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-btn);
  padding: 12px 16px;
  font-family: var(--font);
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.text-input:focus { border-color: var(--primary); }
.text-input::placeholder { color: var(--text-muted); }
.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), #9F7AEA);
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.send-btn:hover { transform: scale(1.05); }

.text-toggle {
  padding: 6px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  color: var(--text-muted);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.text-toggle:hover {
  background: var(--surface-hover);
  color: var(--text-body);
}

/* ── FEEDBACK CARD ── */
.feedback-overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: none;
  align-items: flex-end;
  justify-content: center;
  padding: 16px;
  pointer-events: none;
}
.feedback-overlay.visible { display: flex; pointer-events: auto; }
.feedback-card {
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-card) var(--radius-card) 0 0;
  border-radius: 24px 24px 0 0;
  padding: 24px 20px 28px;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
  animation: feedbackSlideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: auto;
  max-height: 70vh;
  overflow-y: auto;
}
.feedback-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  opacity: 0;
  transition: opacity 0.3s;
}
.feedback-overlay.visible .feedback-backdrop { opacity: 1; }

@keyframes feedbackSlideUp {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.feedback-header {
  text-align: center;
  margin-bottom: 20px;
}
.feedback-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.feedback-subtitle {
  font-size: 13px;
  color: var(--text-muted);
}

.feedback-scores {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 20px;
}
.score-circle {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.score-ring {
  width: 72px;
  height: 72px;
  position: relative;
}
.score-ring svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}
.score-ring-bg {
  fill: none;
  stroke: var(--border);
  stroke-width: 6;
}
.score-ring-fill {

<script>
/* ═══════════════════════════════════════════════
   AI ENGLISH COACH — CONVERSATION ROOM
   ═══════════════════════════════════════════════ */

// ── TOPICS DATA ──
const TOPICS = [
  { id: 'meeting_people', icon: '👋', name: 'Meeting People', subtitle: 'Chào hỏi và giới thiệu bản thân', level: 'A1', duration: '8–12 min', desc: 'Greet and introduce yourself', aiDesc: 'Your AI teacher will pretend to be a new colleague. Practice greetings, introductions, and small talk.' },
  { id: 'my_family', icon: '👨‍👩‍👧', name: 'My Family', subtitle: 'Nói về các thành viên trong gia đình', level: 'A1', duration: '8–12 min', desc: 'Talk about your family members', aiDesc: 'Your AI teacher will ask about your family. Practice describing people and relationships.' },
  { id: 'ordering_food', icon: '🍜', name: 'Ordering Food', subtitle: 'Gọi món tại nhà hàng', level: 'A2', duration: '10–15 min', desc: 'Order at a Vietnamese restaurant', aiDesc: 'Your AI teacher will be a restaurant waiter. Practice ordering food, asking questions, and making polite requests.' },
  { id: 'weather_chat', icon: '🌤️', name: 'Weather Chat', subtitle: 'Thảo luận về thời tiết và các mùa', level: 'A2', duration: '8–12 min', desc: 'Discuss weather and seasons', aiDesc: 'Your AI teacher will chat about the weather. Practice describing conditions, seasons, and preferences.' },
  { id: 'hobbies', icon: '🎮', name: 'Hobbies', subtitle: 'Chia sẻ sở thích và thời gian rảnh', level: 'A2', duration: '10–15 min', desc: 'Share your interests and free time', aiDesc: 'Your AI teacher wants to know about your hobbies. Practice talking about interests, frequency, and opinions.' },
  { id: 'job_interview', icon: '💼', name: 'Job Interview', subtitle: 'Luyện phỏng vấn việc làm bán thời gian', level: 'B1', duration: '12–18 min', desc: 'Practice a part-time job interview', aiDesc: 'Your AI teacher will act as an interviewer. Practice answering common interview questions professionally.' },
  { id: 'ielts_part1', icon: '🎯', name: 'IELTS Part 1', subtitle: 'Trả lời câu hỏi cá nhân IELTS', level: 'B1-B2', duration: '12–18 min', desc: 'Answer personal IELTS questions', aiDesc: 'Your AI teacher is an IELTS examiner. Practice answering Part 1 speaking questions with fluency and detail.' },
  { id: 'debate', icon: '⚖️', name: 'Debate', subtitle: 'Tranh luận quan điểm của bạn', level: 'B2', duration: '15–20 min', desc: 'Argue your opinion on a topic', aiDesc: 'Your AI teacher will challenge your views. Practice forming arguments, giving reasons, and counter-arguing.' },
];

// ── STATE ──
let state = {
  selectedTopic: null,
  studentName: '',
  ws: null,
  sessionId: null,
  turn: 0,
  maxTurns: 10,
  micState: 'idle', // idle | listening | processing
  textMode: false,
  recognition: null,
  isSpeaking: false,
  feedbackTimer: null,
  conversationStarted: false,
};

// ── DOM REFS ──
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

const lobby = $('#lobby');
const room = $('#room');
const topicGrid = $('#topicGrid');
const topicPreview = $('#topicPreview');
const nameInput = $('#nameInput');
const startBtn = $('#startBtn');
const backBtn = $('#backBtn');
const endBtn = $('#endBtn');
const chatArea = $('#chatArea');
const typingIndicator = $('#typingIndicator');
const micBtn = $('#micBtn');
const micLabel = $('#micLabel');
const liveTranscript = $('#liveTranscript');
const textRow = $('#textRow');
const textInput = $('#textInput');
const sendBtn = $('#sendBtn');
const textToggle = $('#textToggle');
const turnCounter = $('#turnCounter');
const progressFill = $('#progressFill');
const roomTopic = $('#roomTopic');
const roomLevel = $('#roomLevel');
const feedbackOverlay = $('#feedbackOverlay');
const feedbackScores = $('#feedbackScores');
const wordBreakdown = $('#wordBreakdown');
const grammarBox = $('#grammarBox');
const feedbackContinue = $('#feedbackContinue');
const feedbackAutoFill = $('#feedbackAutoFill');
const endModalOverlay = $('#endModalOverlay');
const endScores = $('#endScores');
const overallScoreEl = $('#overallScore');
const endFeedback = $('#endFeedback');
const wordsLearned = $('#wordsLearned');
const streakBadge = $('#streakBadge');
const practiceAgain = $('#practiceAgain');
const backHome = $('#backHome');

// ── INIT ──
function init() {
  renderTopics();
  setupSpeechRecognition();
  bindEvents();
  nameInput.value = localStorage.getItem('ec_name') || '';
  checkStartReady();
}

// ── RENDER TOPICS ──
function renderTopics() {
  topicGrid.innerHTML = TOPICS.map(t => `
    <div class="topic-card" data-id="${t.id}">
      <span class="topic-icon">${t.icon}</span>
      <div class="topic-name">${t.name}</div>
      <div class="topic-subtitle">${t.subtitle}</div>
      <div class="topic-meta">
        <span class="level-badge level-${t.level}">${t.level}</span>
        <span class="duration-badge">${t.duration}</span>
      </div>
    </div>
  `).join('');
}

// ── EVENTS ──
function bindEvents() {
  // Topic selection
  topicGrid.addEventListener('click', (e) => {
    const card = e.target.closest('.topic-card');
    if (!card) return;
    const id = card.dataset.id;
    selectTopic(id);
  });

  // Name input
  nameInput.addEventListener('input', () => {
    state.studentName = nameInput.value.trim();
    localStorage.setItem('ec_name', state.studentName);
    checkStartReady();
  });

  // Start button
  startBtn.addEventListener('click', startLesson);

  // Back button
  backBtn.addEventListener('click', goBackToLobby);

  // End button
  endBtn.addEventListener('click', () => endSession(false));

  // Mic button
  micBtn.addEventListener('click', toggleMic);

  // Text toggle
  textToggle.addEventListener('click', toggleTextMode);

  // Send button
  sendBtn.addEventListener('click', sendTextMessage);

  // Text input enter
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendTextMessage();
    }
  });

  // Feedback continue
  feedbackContinue.addEventListener('click', hideFeedback);
  $('#feedbackBackdrop').addEventListener('click', hideFeedback);

  // End modal buttons
  practiceAgain.addEventListener('click', practiceAgainHandler);
  backHome.addEventListener('click', goBackToLobby);
}

// ── SELECT TOPIC ──
function selectTopic(id) {
  state.selectedTopic = TOPICS.find(t => t.id === id);
  $$('.topic-card').forEach(c => c.classList.toggle('selected', c.dataset.id === id));

  // Show preview
  $('#previewIcon').textContent = state.selectedTopic.icon;
  $('#previewTitle').textContent = state.selectedTopic.name + ' — ' + state.selectedTopic.level;
  $('#previewDesc').textContent = state.selectedTopic.desc;
  topicPreview.classList.add('visible');

  checkStartReady();
}

function checkStartReady() {
  startBtn.disabled = !(state.selectedTopic && state.studentName.length >= 1);
}

// ── START LESSON ──
function startLesson() {
  if (!state.selectedTopic || !state.studentName) return;

  // Generate session ID
  state.sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  state.turn = 0;
  state.conversationStarted = false;

  // Update room header
  roomTopic.textContent = state.selectedTopic.icon + ' ' + state.selectedTopic.name;
  roomLevel.textContent = 'Level ' + state.selectedTopic.level + ' • ' + state.selectedTopic.duration;
  updateTurnUI();

  // Transition
  lobby.classList.add('hidden');
  room.classList.add('active');

  // Connect WebSocket
  connectWebSocket();
}

// ── WEBSOCKET ──
function connectWebSocket() {
  const wsHost = window.location.hostname || 'localhost';
  const wsPort = '8089';
  const wsUrl = `ws://${wsHost}:${wsPort}/ws/room/${state.sessionId}`;

  try {
    state.ws = new WebSocket(wsUrl);

    state.ws.onopen = () => {
      console.log('[WS] Connected');
      // Send join message
      wsSend({
        type: 'join',
        student_name: state.studentName,
        topic_id: state.selectedTopic.id,
        topic_name: state.selectedTopic.name,
        level: state.selectedTopic.level,
      });
    };

    state.ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        handleServerMessage(data);
      } catch (e) {
        console.error('[WS] Parse error:', e);
      }
    };

    state.ws.onclose = () => {
      console.log('[WS] Disconnected');
    };

    state.ws.onerror = (err) => {
      console.error('[WS] Error:', err);
      // Fallback: simulate conversation for demo
      simulateDemo();
    };
  } catch (e) {
    console.error('[WS] Connection failed:', e);
    simulateDemo();
  }
}

function wsSend(data) {
  if (state.ws && state.ws.readyState === WebSocket.OPEN) {
    state.ws.send(JSON.stringify(data));
  }
}

// ── HANDLE SERVER MESSAGES ──
function handleServerMessage(data) {
  switch (data.type) {
    case 'ai_greeting':
      hideTyping();
      addAIMessage(data.text || data.message || data.content);
      if (data.audio_url) playAudio(data.audio_url);
      else speakText(data.text || data.message || data.content);
      state.conversationStarted = true;
      break;

    case 'ai_thinking':
      showTyping();
      break;

    case 'ai_response':
      hideTyping();
      addAIMessage(data.text || data.message || data.content);
      if (data.audio_url) playAudio(data.audio_url);
      else speakText(data.text || data.message || data.content);
      if (data.feedback) showFeedback(data.feedback);
      break;

    case 'session_summary':
      showEndModal(data);
      break;

    case 'error':
      hideTyping();
      console.error('[Server Error]', data.message);
      break;

    default:
      console.log('[WS] Unknown message:', data);
  }
}

// ── SIMULATE DEMO (fallback when no server) ──
function simulateDemo() {
  const topic = state.selectedTopic;
  const greetings = {
    'meeting_people': `Hi ${state.studentName}! 👋 I'm your English teacher today. Let's practice meeting new people. Can you introduce yourself? Tell me your name and a little about yourself!`,
    'my_family': `Hello ${state.studentName}! 👨‍👩‍👧 Today we're going to talk about families. Can you tell me about your family? How many people are in your family?`,
    'ordering_food': `Welcome to our restaurant! 🍜 I'm your waiter today. Are you ready to order? What would you like to eat?`,
    'weather_chat': `Hey ${state.studentName}! 🌤️ Beautiful day, isn't it? What's the weather like where you are today?`,
    'hobbies': `Hi there ${state.studentName}! 🎮 I'd love to know — what do you like to do in your free time?`,
    'job_interview': `Good morning, ${state.studentName}. 💼 Thank you for coming in today. Please, have a seat. Can you start by telling me a little about yourself?`,
    'ielts_part1': `Good morning. 🎯 My name is your IELTS examiner. In this part, I'm going to ask you some questions about yourself. Let's start: Can you tell me about where you live?`,
    'debate': `Welcome, ${state.studentName}. ⚖️ Today we're going to debate an interesting topic. Here's the question: "Should students be required to wear school uniforms?" What's your position?`,
  };

  setTimeout(() => {
    showTyping();
    setTimeout(() => {
      hideTyping();
      const greeting = greetings[topic.id] || `Hello ${state.studentName}! Let's practice English together. Tell me about yourself!`;
      addAIMessage(greeting);
      speakText(greeting);
      state.conversationStarted = true;
    }, 1500);
  }, 500);
}

// ── ADD MESSAGES ──
function addAIMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg-ai';
  div.innerHTML = `
    <div class="msg-ai-avatar">🤖</div>
    <div class="msg-ai-body">
      <div class="msg-ai-bubble">${escapeHtml(text)}</div>
      <div class="msg-ai-actions">
        <button class="msg-ai-action" title="Replay" onclick="speakText(\`${escapeJs(text)}\`)">🔊</button>
      </div>
    </div>
  `;
  chatArea.insertBefore(div, typingIndicator);
  scrollToBottom();
}

function addStudentMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg-student';
  div.innerHTML = `<div class="msg-student-bubble">${escapeHtml(text)}</div>`;
  chatArea.insertBefore(div, typingIndicator);
  scrollToBottom();
}

function showTyping() {
  typingIndicator.classList.add('visible');
  scrollToBottom();
}
function hideTyping() {
  typingIndicator.classList.remove('visible');
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

// ── TYPING / THINKING INDICATOR ──
function showTyping() {
  typingIndicator.classList.add('visible');
  scrollToBottom();
}
function hideTyping() {
  typingIndicator.classList.remove('visible');
}

// ── MIC CONTROLS ──
function toggleMic() {
  if (state.micState === 'idle') {
    startListening();
  } else if (state.micState === 'listening') {
    stopListening();
  }
}

function setMicState(newState) {
  state.micState = newState;
  micBtn.className = 'mic-btn ' + newState;

  switch (newState) {
    case 'idle':
      micLabel.textContent = 'Tap to speak';
      liveTranscript.classList.remove('visible');
      liveTranscript.textContent = '';
      break;
    case 'listening':
      micLabel.textContent = 'Listening...';
      liveTranscript.classList.add('visible');
      break;
    case 'processing':
      micLabel.textContent = 'Thinking...';
      liveTranscript.classList.remove('visible');
      break;
  }
}

// ── SPEECH RECOGNITION ──
function setupSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    console.warn('Speech Recognition not supported');
    return;
  }

  state.recognition = new SpeechRecognition();
  state.recognition.continuous = true;
  state.recognition.interimResults = true;
  state.recognition.lang = 'en-US';

  state.recognition.onresult = (event) => {
    let interim = '';
    let final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        final += transcript;
      } else {
        interim += transcript;
      }
    }
    liveTranscript.textContent = final || interim;
    if (final) {
      state._lastTranscript = final.trim();
    }
  };

  state.recognition.onerror = (event) => {
    console.error('Speech recognition error:', event.error);
    if (event.error === 'no-speech' || event.error === 'aborted') {
      setMicState('idle');
    }
  };

  state.recognition.onend = () => {
    if (state.micState === 'listening') {
      // Auto-stop: process what we have
      const text = state._lastTranscript || liveTranscript.textContent.trim();
      if (text) {
        processStudentInput(text);
      } else {
        setMicState('idle');
      }
    }
  };
}

function startListening() {
  if (!state.recognition) {
    alert('Speech recognition is not supported in your browser. Please use Chrome or type your message.');
    return;
  }
  state._lastTranscript = '';
  liveTranscript.textContent = '';
  try {
    state.recognition.start();
    setMicState('listening');
  } catch (e) {
    console.error('Failed to start recognition:', e);
  }
}

function stopListening() {
  if (state.recognition) {
    state.recognition.stop();
  }
  const text = state._lastTranscript || liveTranscript.textContent.trim();
  if (text) {
    processStudentInput(text);
  } else {
    setMicState('idle');
  }
}

// ── PROCESS STUDENT INPUT ──
function processStudentInput(text) {
  setMicState('processing');
  addStudentMessage(text);
  state.turn++;
  updateTurnUI();

  // Send to server
  wsSend({
    type: 'student_message',
    text: text,
    turn: state.turn,
  });

  // Simulate AI response for demo
  simulateAIResponse(text);
}

// ── SIMULATE AI RESPONSE (demo fallback) ──
function simulateAIResponse(studentText) {
  showTyping();

  const topic = state.selectedTopic;
  const responses = getDemoResponses(topic.id, studentText, state.turn);

  const delay = 1500 + Math.random() * 2000;
  setTimeout(() => {
    hideTyping();
    addAIMessage(responses.text);
    speakText(responses.text);

    // Show feedback
    if (responses.feedback) {
      setTimeout(() => showFeedback(responses.feedback), 500);
    }

    setMicState('idle');

    // Check if session should end
    if (state.turn >= state.maxTurns) {
      setTimeout(() => endSession(true), 3000);
    }
  }, delay);
}

function getDemoResponses(topicId, studentText, turn) {
  const wordCount = studentText.split(/\s+/).length;
  const grammarScore = Math.min(100, 60 + Math.floor(Math.random() * 30) + Math.min(wordCount * 2, 15));
  const pronScore = Math.min(100, 55 + Math.floor(Math.random() * 35) + Math.min(wordCount, 10));
  const fluencyScore = Math.min(100, 50 + Math.floor(Math.random() * 35) + Math.min(wordCount * 2, 20));

  const feedback = {
    grammar_score: grammarScore,
    pronunciation_score: pronScore,
    fluency_score: fluencyScore,
    words: studentText.split(/\s+/).map((w, i) => ({
      text: w,
      score: 0.5 + Math.random() * 0.5,
    })),
    correction: wordCount < 3 ? {
      original: studentText,
      corrected: studentText.charAt(0).toUpperCase() + studentText.slice(1) + '.',
      explanation_vi: 'Hãy cố gắng nói câu đầy đủ hơn nhé! (Try to use complete sentences!)',
    } : null,
  };

  const followUps = {
    'meeting_people': [
      `That's great, ${state.studentName}! Nice to meet you. Where are you from?`,
      `Interesting! What do you do for work or study?`,
      `I see! What do you like to do in your free time?`,
      `That sounds fun! Do you have any brothers or sisters?`,
      `Wonderful! What's your favorite food?`,
    ],
    'my_family': [
      `That's lovely! What does your father do?`,
      `How about your mother? What is she like?`,
      `Do you have any siblings? Tell me about them!`,
      `What does your family like to do together?`,
      `That's wonderful! Is there a special family tradition you enjoy?`,
    ],
    'ordering_food': [
      `Great choice! Would you like anything to drink with that?`,
      `Would you like to see our dessert menu?`,
      `How spicy would you like your food? Mild, medium, or hot?`,
      `Excellent! Your order will be ready in about 15 minutes.`,
      `Would you like that for here or to go?`,
    ],
    'default': [
      `That's very interesting! Can you tell me more about that?`,
      `Great answer! Why do you think that is?`,
      `I understand. Can you give me an example?`,
      `Wonderful! What else can you say about this topic?`,
      `That's a good point. How do you feel about it?`,
    ],
  };

  const responses = followUps[topicId] || followUps['default'];
  const text = responses[Math.min(turn - 1, responses.length - 1)] || responses[responses.length - 1];

  return { text, feedback };
}

// ── TEXT MODE ──
function toggleTextMode() {
  state.textMode = !state.textMode;
  if (state.textMode) {
    micBtn.style.display = 'none';
    micLabel.style.display = 'none';
    textRow.classList.add('active');
    textToggle.textContent = '🎤 Voice';
    textInput.focus();
  } else {
    micBtn.style.display = '';
    micLabel.style.display = '';
    textRow.classList.remove('active');
    textToggle.textContent = '⌨️ Type';
  }
}

function sendTextMessage() {
  const text = textInput.value.trim();
  if (!text) return;
  textInput.value = '';
  processStudentInput(text);
}

// ── TTS ──
function speakText(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = 0.9;
  utterance.pitch = 1;

  // Try to pick a good voice
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google')) ||
                    voices.find(v => v.lang.startsWith('en'));
  if (preferred) utterance.voice = preferred;

  state.isSpeaking = true;
  utterance.onend = () => { state.isSpeaking = false; };
  utterance.onerror = () => { state.isSpeaking = false; };

  window.speechSynthesis.speak(utterance);
}

function playAudio(url) {
  const audio = new Audio(url);
  audio.play().catch(() => {});
}

// ── FEEDBACK ──
function showFeedback(data) {
  const grammar = data.grammar_score || 75;
  const pron = data.pronunciation_score || 70;

  // Scores
  feedbackScores.innerHTML = `
    ${createScoreCircle('Grammar', grammar, getColor(grammar))}
    ${createScoreCircle('Pronunciation', pron, getColor(pron))}
  `;

  // Word breakdown
  if (data.words && data.words.length) {
    wordBreakdown.innerHTML = data.words.map(w => {
      const cls = w.score >= 0.8 ? 'word-good' : w.score >= 0.5 ? 'word-ok' : 'word-bad';
      return `<span class="word-item ${cls}">${escapeHtml(w.text)}</span>`;
    }).join('');
    wordBreakdown.style.display = 'flex';
  } else {
    wordBreakdown.style.display = 'none';
  }

  // Grammar correction
  if (data.correction) {
    grammarBox.innerHTML = `
      <div class="grammar-original">${escapeHtml(data.correction.original)}</div>
      <div class="grammar-corrected">✓ ${escapeHtml(data.correction.corrected)}</div>
      <div class="grammar-explanation">${escapeHtml(data.correction.explanation_vi || '')}</div>
    `;
    grammarBox.style.display = 'block';
  } else {
    grammarBox.style.display = 'none';
  }

  // Show overlay
  feedbackOverlay.classList.add('visible');

  // Animate score rings
  requestAnimationFrame(() => {
    feedbackScores.querySelectorAll('.score-ring-fill').forEach(el => {
      const target = el.dataset.target;
      const circumference = 2 * Math.PI * 28;
      el.style.strokeDashoffset = circumference - (target / 100) * circumference;
    });
    // Auto-dismiss bar
    feedbackAutoFill.style.width = '0%';
  });

  // Auto dismiss
  clearTimeout(state.feedbackTimer);
  state.feedbackTimer = setTimeout(hideFeedback, 8000);
}

function createScoreCircle(label, value, color) {
  const circumference = 2 * Math.PI * 28;
  return `
    <div class="score-circle">
      <div class="score-ring">
        <svg viewBox="0 0 64 64">
          <circle class="score-ring-bg" cx="32" cy="32" r="28"/>
          <circle class="score-ring-fill" cx="32" cy="32" r="28"
            stroke="${color}"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${circumference}"
            data-target="${value}"/>
        </svg>
        <div class="score-ring-value">${value}</div>
      </div>
      <span class="score-label">${label}</span>
    </div>
  `;
}

function getColor(score) {
  if (score >= 80) return '#34D399';
  if (score >= 60) return '#FBBF24';
  return '#F87171';
}

function hideFeedback() {
  feedbackOverlay.classList.remove('visible');
  clearTimeout(state.feedbackTimer);
}

// ── TURN & PROGRESS UI ──
function updateTurnUI() {
  turnCounter.textContent = `Turn ${state.turn}/${state.maxTurns}`;
  progressFill.style.width = `${(state.turn / state.maxTurns) * 100}%`;
}

// ── END SESSION ──
function endSession(completed) {
  if (!completed && state.turn > 0) {
    if (!confirm('Are you sure you want to end this lesson?')) return;
  }

  // Request summary from server
  wsSend({ type: 'end_session' });

  // Show modal (with demo data if no server response)
  setTimeout(() => {
    if (!endModalOverlay.classList.contains('visible')) {
      showEndModal(null);
    }
  }, 1000);
}

function showEndModal(data) {
  const grammar = data?.grammar_avg || 70 + Math.floor(Math.random() * 20);
  const pron = data?.pronunciation_avg || 65 + Math.floor(Math.random() * 25);
  const fluency = data?.fluency_avg || 60 + Math.floor(Math.random() * 25);
  const overall = data?.overall_score || Math.round((grammar + pron + fluency) / 3);
  const feedbackText = data?.feedback || `Great job today, ${state.studentName}! You practiced ${state.turn} conversation turns on "${state.selectedTopic.name}". Keep practicing every day to improve your fluency and confidence! 💪`;
  const words = data?.words_learned || ['hello', 'introduce', 'family', 'hobby', 'restaurant', 'weather', 'opinion'];

  endScores.innerHTML = `
    ${createScoreCircle('Grammar', grammar, getColor(grammar))}
    ${createScoreCircle('Pronunciation', pron, getColor(pron))}
    ${createScoreCircle('Fluency', fluency, getColor(fluency))}
  `;

  endFeedback.textContent = feedbackText;
  wordsLearned.innerHTML = words.map(w => `<span class="word-tag">${w}</span>`).join('');
  streakBadge.innerHTML = `🔥 ${data?.streak || 1} Day Streak`;

  endModalOverlay.classList.add('visible');

  // Animate score rings
  requestAnimationFrame(() => {
    endScores.querySelectorAll('.score-ring-fill').forEach(el => {
      const target = el.dataset.target;
      const circumference = 2 * Math.PI * 28;
      el.style.strokeDashoffset = circumference - (target / 100) * circumference;
    });
  });

  // Count up overall score
  animateCounter(overallScoreEl, 0, overall, 800);

  // Confetti
  launchConfetti();
}

// ── ANIMATED COUNTER ──
function animateCounter(el, from, to, duration) {
  const start = performance.now();
  const step = (timestamp) => {
    const progress = Math.min((timestamp - start) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(from + (to - from) * eased);
    if (progress < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

// ── CONFETTI ──
function launchConfetti() {
  const canvas = $('#confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];
  const colors = ['#7C5CFC', '#00D4FF', '#34D399', '#FBBF24', '#F87171', '#A78BFA', '#F472B6'];

  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height * -1,
      vx: (Math.random() - 0.5) * 6,
      vy: Math.random() * 4 + 2,
      size: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * 360,
      rotationSpeed: (Math.random() - 0.5) * 10,
      opacity: 1,
    });
  }

  let frame = 0;
  const maxFrames = 180;

  function animate() {
    if (frame > maxFrames) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      return;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.rotation += p.rotationSpeed;
      if (frame > maxFrames * 0.7) p.opacity -= 0.02;
      p.opacity = Math.max(0, p.opacity);

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate((p.rotation * Math.PI) / 180);
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
      ctx.restore();
    });

    frame++;
    requestAnimationFrame(animate);
  }
  animate();
}

// ── NAVIGATION ──
function goBackToLobby() {
  // Cleanup
  if (state.ws) {
    state.ws.close();
    state.ws = null;
  }
  if (state.recognition) {
    try { state.recognition.stop(); } catch(e) {}
  }
  window.speechSynthesis?.cancel();
  clearTimeout(state.feedbackTimer);

  // Reset
  state.turn = 0;
  state.micState = 'idle';
  state.conversationStarted = false;
  state.textMode = false;

  // Clear chat
  const msgs = chatArea.querySelectorAll('.msg-ai, .msg-student');
  msgs.forEach(m => m.remove());

  // Reset UI
  setMicState('idle');
  micBtn.style.display = '';
  micLabel.style.display = '';
  textRow.classList.remove('active');
  textToggle.textContent = '⌨️ Type';
  updateTurnUI();

  // Switch views
  room.classList.remove('active');
  endModalOverlay.classList.remove('visible');
  feedbackOverlay.classList.remove('visible');
  lobby.classList.remove('hidden');
}

function practiceAgainHandler() {
  endModalOverlay.classList.remove('visible');
  const topic = state.selectedTopic;
  const name = state.studentName;
  goBackToLobby();
  state.selectedTopic = topic;
  state.studentName = name;
  selectTopic(topic.id);
  startLesson();
}

// ── UTILS ──
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
function escapeJs(text) {
  return text.replace(/`/g, '\\`').replace(/\$/g, '\\$');
}

// ── VOICES LOADED ──
window.speechSynthesis?.onvoiceschanged = () => {};

// ── INIT ──
document.addEventListener('DOMContentLoaded', init);
