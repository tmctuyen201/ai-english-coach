<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI English Coach — Voice Room</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#09090b;--bg2:#111114;--bg3:#18181b;--bg4:#1f1f23;
  --border:#27272a;--border2:#3f3f46;
  --text:#fafafa;--text2:#a1a1aa;--text3:#71717a;
  --accent:#6366f1;--accent2:#818cf8;--accent3:#a5b4fc;
  --green:#22c55e;--green2:#4ade80;
  --red:#ef4444;--yellow:#f59e0b;
  --gradient:linear-gradient(135deg,#6366f1,#06b6d4);
  --glow:0 0 40px rgba(99,102,241,0.12);
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text)}

/* ═══ LOBBY ═══ */
#lobby{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:32px;position:relative;overflow:hidden}
#lobby::before{content:'';position:absolute;top:-300px;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(99,102,241,0.08) 0%,transparent 60%);pointer-events:none}
#lobby>*{position:relative;z-index:1}
#lobby .logo{font-size:14px;color:var(--text3);margin-bottom:40px;display:flex;align-items:center;gap:8px}
#lobby .logo span{font-weight:600;color:var(--text2)}
#lobby h1{font-size:clamp(28px,5vw,40px);font-weight:700;text-align:center;margin-bottom:8px;letter-spacing:-0.02em}
#lobby h1 em{font-style:normal;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#lobby .sub{font-size:15px;color:var(--text2);text-align:center;margin-bottom:36px}
#lobby input{width:100%;max-width:380px;padding:14px 18px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;font-family:inherit;outline:none;text-align:center;transition:all 0.2s}
#lobby input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,0.12)}
#lobby input::placeholder{color:var(--text3)}

.topics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;width:100%;max-width:520px;margin-bottom:28px}
.topic-btn{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:20px 12px;cursor:pointer;text-align:center;transition:all 0.2s}
.topic-btn:hover{border-color:var(--accent);background:rgba(99,102,241,0.05)}
.topic-btn.selected{border-color:var(--accent);background:rgba(99,102,241,0.08);box-shadow:0 0 20px rgba(99,102,241,0.1)}
.topic-btn .icon{font-size:28px;display:block;margin-bottom:8px}
.topic-btn .name{font-size:13px;font-weight:600;color:var(--text)}
.topic-btn .level{font-size:11px;color:var(--text3);margin-top:3px}

#start-btn{padding:14px 48px;background:var(--gradient);border:none;border-radius:var(--radius-sm);color:#fff;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s}
#start-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(99,102,241,0.3)}
#start-btn:active{transform:translateY(0)}

/* ═══ ROOM ═══ */
#room{display:none;flex-direction:column;height:100vh;background:var(--bg)}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg2);border-bottom:1px solid var(--border);min-height:56px}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-back{width:36px;height:36px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.topbar-back:hover{border-color:var(--accent);color:var(--text)}
.topbar-info .topic{font-size:14px;font-weight:600}
.topbar-info .meta{font-size:11px;color:var(--text3);margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-turns{font-size:12px;color:var(--text3);padding:4px 10px;background:var(--bg3);border-radius:100px}
.topbar-end{padding:8px 16px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;color:var(--red);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s}
.topbar-end:hover{background:rgba(239,68,68,0.2)}

/* Chat */
.chat{flex:1;overflow-y:auto;padding:20px;scroll-behavior:smooth;display:flex;flex-direction:column;gap:4px}
.msg{max-width:82%;animation:msg-in 0.35s ease}
.msg.ai{align-self:flex-start}
.msg.student{align-self:flex-end}
.msg .label{font-size:11px;color:var(--text3);margin-bottom:4px;padding:0 4px}
.msg.student .label{text-align:right}
.msg .bubble{padding:12px 16px;font-size:14px;line-height:1.65}
.msg.ai .bubble{background:var(--bg3);border:1px solid var(--border);border-radius:4px 16px 16px 16px}
.msg.student .bubble{background:var(--gradient);color:#fff;border-radius:16px 16px 4px 16px}

.typing{display:flex;gap:5px;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:4px 16px 16px 16px;width:fit-content;margin-bottom:8px}
.typing span{width:6px;height:6px;background:var(--text3);border-radius:50%;animation:bounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Input area */
.input-area{padding:12px 20px 16px;background:var(--bg2);border-top:1px solid var(--border)}

/* Mode toggle */
.mode-row{display:flex;justify-content:center;gap:6px;margin-bottom:10px}
.mode-pill{padding:5px 14px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:12px;font-family:inherit;cursor:pointer;transition:all 0.2s}
.mode-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Voice mode */
.voice-area{display:flex;flex-direction:column;align-items:center;gap:10px;padding:8px 0}
.transcript{font-size:13px;color:var(--accent3);min-height:18px;text-align:center;max-width:90%;line-height:1.5}
.mic{width:64px;height:64px;border-radius:50%;background:var(--gradient);border:none;color:#fff;font-size:26px;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(99,102,241,0.25)}
.mic:hover{transform:scale(1.06)}
.mic.rec{background:linear-gradient(135deg,var(--red),#f87171);box-shadow:0 4px 24px rgba(239,68,68,0.35);animation:pulse-mic 1.5s infinite}
.mic:disabled{opacity:.35;cursor:default;transform:none}
@keyframes pulse-mic{0%,100%{box-shadow:0 4px 24px rgba(239,68,68,0.35)}50%{box-shadow:0 4px 40px rgba(239,68,68,0.55)}}
.mic-hint{font-size:12px;color:var(--text3)}

/* Text mode */
.text-row{display:flex;gap:10px;align-items:center}
.text-input{flex:1;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:100px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border 0.2s}
.text-input:focus{border-color:var(--accent)}
.text-input::placeholder{color:var(--text3)}
.send{width:44px;height:44px;border-radius:50%;background:var(--gradient);border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;transition:transform 0.15s}
.send:hover{transform:scale(1.06)}

/* ═══ SUMMARY MODAL ═══ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center;padding:24px}
.overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:36px;max-width:440px;width:100%;text-align:center;animation:modal-in 0.3s ease}
@keyframes modal-in{from{opacity:0;transform:scale(0.95) translateY(10px)}to{opacity:1;transform:none}}
.modal h2{font-size:22px;font-weight:700;margin-bottom:8px}
.modal h2 em{font-style:normal;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal .subtitle{font-size:14px;color:var(--text2);margin-bottom:24px}
.modal-stats{display:flex;gap:12px;margin-bottom:24px}
.modal-stat{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 8px}
.modal-stat .val{font-size:24px;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal-stat .lbl{font-size:11px;color:var(--text3);margin-top:4px}
.modal .feedback-title{font-size:13px;font-weight:600;color:var(--accent2);text-align:left;margin-bottom:8px}
.modal .feedback-text{font-size:14px;color:var(--text2);text-align:left;line-height:1.7;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:24px}
.modal .close-btn{width:100%;padding:14px;background:var(--gradient);border:none;border-radius:var(--radius-sm);color:#fff;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s}
.modal .close-btn:hover{box-shadow:0 8px 24px rgba(99,102,241,0.3)}
</style>
</head>
<body>

<!-- ═══ LOBBY ═══ -->
<div id="lobby">
  <div class="logo">🗣️ <span>AI English Coach</span></div>
  <h1>Ready to <em>practice English</em>?</h1>
  <p class="sub">Choose a topic and start talking with your AI teacher</p>
  <input type="text" id="name-input" placeholder="What's your name?" maxlength="30">
  <div class="topics" id="topic-grid"></div>
  <button id="start-btn" onclick="startRoom()">🎙️ Start Conversation</button>
</div>

<!-- ═══ ROOM ═══ -->
<div id="room">
  <div class="topbar">
    <div class="topbar-left">
      <button class="topbar-back" onclick="leaveRoom()">←</button>
      <div class="topbar-info">
        <div class="topic" id="room-topic">Free Chat</div>
        <div class="meta" id="room-meta">Level A2</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="topbar-turns" id="turn-counter">Turn 0</div>
      <button class="topbar-end" onclick="endSession()">End</button>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <div class="mode-row">
      <button class="mode-pill active" id="mode-voice" onclick="setMode('voice')">🎤 Voice</button>
      <button class="mode-pill" id="mode-text" onclick="setMode('text')">⌨️ Text</button>
    </div>
    <div class="voice-area" id="voice-mode">
      <div class="transcript" id="live-transcript"></div>
      <button class="mic" id="mic-btn" onmousedown="startMic()" onmouseup="stopMic()" ontouchstart="startMic()" ontouchend="stopMic()">🎤</button>
      <div class="mic-hint" id="mic-hint">Hold to speak</div>
    </div>
    <div class="text-row" id="text-mode" style="display:none">
      <input type="text" class="text-input" id="text-input" placeholder="Type in English..." onkeydown="if(event.key==='Enter')sendText()">
      <button class="send" onclick="sendText()">→</button>
    </div>
  </div>
</div>

<!-- ═══ SUMMARY ═══ -->
<div class="overlay" id="summary-modal">
  <div class="modal">
    <h2>🎉 <em>Great Practice!</em></h2>
    <p class="subtitle">Here's how your session went</p>
    <div class="modal-stats">
      <div class="modal-stat"><div class="val" id="sum-turns">0</div><div class="lbl">Turns</div></div>
      <div class="modal-stat"><div class="val" id="sum-topic">💬</div><div class="lbl">Topic</div></div>
    </div>
    <div class="feedback-title">📝 AI Feedback</div>
    <div class="feedback-text" id="sum-feedback">Loading...</div>
    <button class="close-btn" onclick="closeSummary()">Back to Lobby</button>
  </div>
</div>

<script>
const TOPICS=[
  {id:"free-chat",en:"Free Chat",vi:"Nói Chuyện Tự Do",level:"A2",icon:"💬"},
  {id:"ordering-food",en:"Ordering Food",vi:"Gọi Món",level:"A2",icon:"🍜"},
  {id:"meeting-people",en:"Meeting People",vi:"Gặp Gỡ",level:"A1",icon:"👋"},
  {id:"ielts-part1",en:"IELTS Part 1",vi:"IELTS Part 1",level:"B1-B2",icon:"🎯"},
  {id:"job-interview",en:"Job Interview",vi:"Phỏng Vấn",level:"B1",icon:"💼"}
];
let selTopic="free-chat",ws=null,isRec=false,recognition=null,curMode="voice",turns=0,synth=window.speechSynthesis;

function init(){
  const g=document.getElementById("topic-grid");
  TOPICS.forEach(t=>{
    const b=document.createElement("div");
    b.className="topic-btn"+(t.id===selTopic?" selected":"");
    b.innerHTML=`<span class="icon">${t.icon}</span><div class="name">${t.en}</div><div class="level">${t.level}</div>`;
    b.onclick=()=>{selTopic=t.id;document.querySelectorAll(".topic-btn").forEach(x=>x.classList.remove("selected"));b.classList.add("selected")};
    g.appendChild(b);
  });
  if("webkitSpeechRecognition"in window||"SpeechRecognition"in window){
    const R=window.SpeechRecognition||window.webkitSpeechRecognition;
    recognition=new R();recognition.continuous=false;recognition.interimResults=true;recognition.lang="en-US";
    recognition.onresult=e=>{
      let i="",f="";
      for(let j=e.resultIndex;j<e.results.length;j++){if(e.results[j].isFinal)f+=e.results[j][0].transcript;else i+=e.results[j][0].transcript}
      document.getElementById("live-transcript").textContent=i||f||"";
      if(f)sendSpeech(f.trim());
    };
    recognition.onerror=()=>stopRec();
    recognition.onend=()=>{if(isRec)stopRec()};
  }
}

function startRoom(){
  const name=document.getElementById("name-input").value.trim()||"Student";
  const t=TOPICS.find(x=>x.id===selTopic);
  document.getElementById("lobby").style.display="none";
  document.getElementById("room").style.display="flex";
  document.getElementById("room-topic").textContent=`${t.icon} ${t.en}`;
  document.getElementById("room-meta").textContent=`${t.level} · ${t.vi}`;
  document.getElementById("chat").innerHTML="";
  turns=0;updateTurns();
  const sid=Math.random().toString(36).slice(2,10);
  const p=location.protocol==="https:"?"wss:":"ws:";
  ws=new WebSocket(`${p}//${location.host}/ws/room/${sid}`);
  ws.onopen=()=>ws.send(JSON.stringify({type:"start",topic:selTopic,name}));
  ws.onmessage=e=>handleMsg(JSON.parse(e.data));
}

function leaveRoom(){
  if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:"end"}));
  document.getElementById("room").style.display="none";
  document.getElementById("lobby").style.display="flex";
  if(ws)ws.close();synth.cancel();
}

function handleMsg(d){
  switch(d.type){
    case"ai_greeting":addAI(d.text);speak(d.text);break;
    case"ai_thinking":showTyping();break;
    case"ai_response":removeTyping();addAI(d.text);speak(d.text);turns=d.turn||turns;updateTurns();break;
    case"session_summary":removeTyping();showSummary(d);break;
    case"error":removeTyping();addAI(d.message||"Try again?");break;
  }
}

function addAI(t){const c=document.getElementById("chat");c.innerHTML+=`<div class="msg ai"><div class="label">🤖 AI</div><div class="bubble">${esc(t)}</div></div>`;c.scrollTop=c.scrollHeight;document.getElementById("mic-btn").disabled=false;document.getElementById("mic-hint").textContent="Hold to speak"}
function addYou(t){const c=document.getElementById("chat");c.innerHTML+=`<div class="msg student"><div class="label">You</div><div class="bubble">${esc(t)}</div></div>`;c.scrollTop=c.scrollHeight}
function showTyping(){removeTyping();const c=document.getElementById("chat");c.innerHTML+=`<div class="typing" id="typing"><span></span><span></span><span></span></div>`;c.scrollTop=c.scrollHeight;document.getElementById("mic-btn").disabled=true;document.getElementById("mic-hint").textContent="AI thinking..."}
function removeTyping(){const e=document.getElementById("typing");if(e)e.remove()}
function updateTurns(){document.getElementById("turn-counter").textContent=`Turn ${turns}`}
function esc(t){const d=document.createElement("div");d.textContent=t;return d.innerHTML}

function startMic(){if(!recognition||isRec)return;isRec=true;synth.cancel();document.getElementById("mic-btn").classList.add("rec");document.getElementById("live-transcript").textContent="Listening...";document.getElementById("mic-hint").textContent="Release to send";try{recognition.start()}catch(e){}}
function stopMic(){if(!isRec)return;isRec=false;document.getElementById("mic-btn").classList.remove("rec");document.getElementById("mic-hint").textContent="Processing...";try{recognition.stop()}catch(e){}}
function stopRec(){isRec=false;document.getElementById("mic-btn").classList.remove("rec");document.getElementById("mic-hint").textContent="Hold to speak"}
function sendSpeech(t){if(!t||!ws||ws.readyState!==1)return;document.getElementById("live-transcript").textContent="";addYou(t);ws.send(JSON.stringify({type:"student_speech",text:t}))}

function setMode(m){curMode=m;document.getElementById("mode-voice").classList.toggle("active",m==="voice");document.getElementById("mode-text").classList.toggle("active",m==="text");document.getElementById("voice-mode").style.display=m==="voice"?"flex":"none";document.getElementById("text-mode").style.display=m==="text"?"flex":"none";if(m==="text")document.getElementById("text-input").focus()}
function sendText(){const i=document.getElementById("text-input"),t=i.value.trim();if(!t)return;addYou(t);i.value="";if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:"student_speech",text:t}))}

function speak(t){if(!synth)return;synth.cancel();const u=new SpeechSynthesisUtterance(t.replace(/[*_#`]/g,"").replace(/\n/g," "));u.lang="en-US";u.rate=0.9;const v=synth.getVoices().find(x=>x.lang.startsWith("en"));if(v)u.voice=v;synth.speak(u)}
if(synth){synth.getVoices();synth.onvoiceschanged=()=>synth.getVoices()}

function endSession(){if(ws&&ws.readyState===1){showTyping();ws.send(JSON.stringify({type:"end"}))}}
function showSummary(d){removeTyping();document.getElementById("sum-turns").textContent=d.turns||turns;document.getElementById("sum-topic").textContent=TOPICS.find(x=>x.id===selTopic)?.icon||"💬";document.getElementById("sum-feedback").textContent=d.summary||"Great practice!";document.getElementById("summary-modal").classList.add("show")}
function closeSummary(){document.getElementById("summary-modal").classList.remove("show");document.getElementById("room").style.display="none";document.getElementById("lobby").style.display="flex";if(ws)ws.close()}

init();
</script>
</body>
</html>
