<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topics — AI English Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #09090b;
            color: #fafafa;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* NAV */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(9,9,11,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #27272a;
            padding: 0 24px;
        }
        .nav-inner {
            max-width: 1200px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            height: 64px;
        }
        .nav-logo {
            font-weight: 800; font-size: 18px;
            background: linear-gradient(135deg, #6366f1, #06b6d4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 8px; align-items: center; }
        .nav-links a {
            color: #a1a1aa; text-decoration: none; font-size: 14px; font-weight: 500;
            padding: 8px 16px; border-radius: 100px; transition: all 0.2s;
        }
        .nav-links a:hover { color: #fafafa; background: rgba(99,102,241,0.1); }
        .nav-links a.active { color: #fafafa; background: rgba(99,102,241,0.15); }
        .nav-cta {
            background: linear-gradient(135deg, #6366f1, #06b6d4);
            color: #fff !important; font-weight: 600; padding: 8px 20px;
            border-radius: 100px; text-decoration: none; font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,0.4); }

        .hamburger { display: none; background: none; border: none; color: #fafafa; font-size: 24px; cursor: pointer; }

        /* MAIN */
        .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

        /* SEARCH & FILTERS */
        .search-section { margin-bottom: 32px; }
        .search-bar {
            display: flex; align-items: center; gap: 12px;
            background: #111114; border: 1px solid #27272a; border-radius: 16px;
            padding: 12px 20px; margin-bottom: 16px;
        }
        .search-bar svg { width: 20px; height: 20px; color: #71717a; flex-shrink: 0; }
        .search-bar input {
            flex: 1; background: none; border: none; outline: none;
            color: #fafafa; font-size: 15px; font-family: 'Inter', sans-serif;
        }
        .search-bar input::placeholder { color: #71717a; }
        .filter-pills { display: flex; gap: 8px; flex-wrap: wrap; }
        .pill {
            padding: 8px 20px; border-radius: 100px; font-size: 13px; font-weight: 600;
            border: 1px solid #27272a; background: #111114; color: #a1a1aa;
            cursor: pointer; transition: all 0.2s;
        }
        .pill:hover { border-color: #6366f1; color: #fafafa; }
        .pill.active {
            background: linear-gradient(135deg, #6366f1, #06b6d4);
            border-color: transparent; color: #fff;
        }

        /* SECTION TITLES */
        .section-title {
            font-size: 20px; font-weight: 700; margin-bottom: 20px;
            display: flex; align-items: center; gap: 8px;
        }
        .section-title span { font-size: 24px; }

        /* RECOMMENDED */
        .recommended { margin-bottom: 48px; }
        .rec-scroll { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px; }
        .rec-scroll::-webkit-scrollbar { height: 4px; }
        .rec-scroll::-webkit-scrollbar-track { background: transparent; }
        .rec-scroll::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
        .rec-card {
            flex-shrink: 0; width: 260px;
            background: #111114; border: 1px solid #27272a; border-radius: 16px;
            padding: 24px; cursor: pointer;
            transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }
        .rec-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(135deg, #6366f1, #06b6d4);
        }
        .rec-card:hover { transform: translateY(-4px); border-color: #6366f1; box-shadow: 0 8px 32px rgba(99,102,241,0.15); }
        .rec-emoji { font-size: 40px; margin-bottom: 12px; }
        .rec-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .rec-name-vi { font-size: 13px; color: #a1a1aa; margin-bottom: 12px; }
        .rec-badge { display: inline-block; padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; margin-bottom: 12px; }
        .badge-a1 { background: rgba(34,197,94,0.15); color: #22c55e; }
        .badge-a2 { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .badge-b1 { background: rgba(234,179,8,0.15); color: #eab308; }
        .badge-b2 { background: rgba(168,85,247,0.15); color: #a855f7; }
        .rec-meta { display: flex; justify-content: space-between; align-items: center; }
        .rec-duration { font-size: 12px; color: #71717a; }
        .rec-btn {
            background: linear-gradient(135deg, #6366f1, #06b6d4);
            color: #fff; border: none; padding: 8px 20px; border-radius: 100px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        .rec-btn:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(99,102,241,0.4); }

        /* TOPIC GRID */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .topic-card {
            background: #111114; border: 1px solid #27272a; border-radius: 16px;
            padding: 28px; cursor: pointer;
            transition: all 0.3s ease;
            display: flex; flex-direction: column;
        }
        .topic-card:hover { transform: translateY(-4px); border-color: #6366f1; box-shadow: 0 8px 32px rgba(99,102,241,0.15); }
        .topic-emoji { font-size: 48px; margin-bottom: 16px; }
        .topic-name { font-weight: 700; font-size: 17px; margin-bottom: 4px; }
        .topic-name-vi { font-size: 13px; color: #a1a1aa; margin-bottom: 12px; }
        .topic-desc { font-size: 13px; color: #71717a; margin-bottom: 16px; line-height: 1.5; flex: 1; }
        .topic-footer { display: flex; justify-content: space-between; align-items: center; }
        .topic-duration { font-size: 12px; color: #71717a; display: flex; align-items: center; gap: 4px; }
        .topic-btn {
            background: transparent; border: 1px solid #6366f1; color: #6366f1;
            padding: 8px 24px; border-radius: 100px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        .topic-btn:hover {
            background: linear-gradient(135deg, #6366f1, #06b6d4);
            border-color: transparent; color: #fff;
        }

        /* ANIMATIONS */
        .fade-in { animation: fadeIn 0.5s ease forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        .topic-card.fade-in { transform: translateY(20px); }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .topics-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .nav-links a:not(.nav-cta) { display: none; }
            .hamburger { display: block; }
            .nav-links.open a { display: block; }
            .nav-links.open {
                position: absolute; top: 64px; left: 0; right: 0;
                background: #09090b; border-bottom: 1px solid #27272a;
                padding: 16px 24px; display: flex; flex-direction: column; gap: 8px;
            }
            .topics-grid { grid-template-columns: 1fr; }
            .container { padding: 20px 16px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="/room/topics.html" class="nav-logo">AI English Coach</a>
            <button class="hamburger" onclick="toggleMenu()">☰</button>
            <div class="nav-links" id="navLinks">
                <a href="/room/topics.html" class="active">Topics</a>
                <a href="/room/vocabulary.html">Vocabulary</a>
                <a href="/room/progress.html">Progress</a>
                <a href="/room?topic=greeting" class="nav-cta">Start Practice</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Search -->
        <div class="search-section">
            <div class="search-bar">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/></svg>
                <input type="text" placeholder="Search topics..." id="searchInput" oninput="filterTopics()">
            </div>
            <div class="filter-pills">
                <button class="pill active" onclick="setFilter('all', this)">All</button>
                <button class="pill" onclick="setFilter('a1', this)">A1</button>
                <button class="pill" onclick="setFilter('a2', this)">A2</button>
                <button class="pill" onclick="setFilter('b1', this)">B1</button>
                <button class="pill" onclick="setFilter('b2', this)">B2</button>
                <button class="pill" onclick="setFilter('b2', this)">IELTS</button>
            </div>
        </div>

        <!-- Recommended -->
        <div class="recommended" id="recommended">
            <div class="section-title"><span>✨</span> Recommended for You</div>
            <div class="rec-scroll" id="recScroll"></div>
        </div>

        <!-- All Topics -->
        <div class="section-title"><span>📚</span> All Topics</div>
        <div class="topics-grid" id="topicsGrid"></div>
    </div>

    <script>
        const topics = [
            // A1
            { id: 'meeting-people', icon: '👋', name: 'Meeting People', vi: 'Gặp gỡ mọi người', level: 'a1', desc: 'Learn to introduce yourself and greet others in everyday situations.', duration: '8-10 min' },
            { id: 'family', icon: '👨‍👩‍👧', name: 'Family', vi: 'Gia đình', level: 'a1', desc: 'Talk about your family members and describe relationships.', duration: '8-10 min' },
            { id: 'numbers-colors', icon: '🔢', name: 'Numbers & Colors', vi: 'Số & Màu sắc', level: 'a1', desc: 'Practice counting, saying phone numbers, and describing colors.', duration: '6-8 min' },
            // A2
            { id: 'ordering-food', icon: '🍜', name: 'Ordering Food', vi: 'Gọi món ăn', level: 'a2', desc: 'Order meals at restaurants and ask about menu items confidently.', duration: '10-12 min' },
            { id: 'weather', icon: '🌤️', name: 'Weather', vi: 'Thời tiết', level: 'a2', desc: 'Describe weather conditions and talk about seasons.', duration: '8-10 min' },
            { id: 'shopping', icon: '🛍️', name: 'Shopping', vi: 'Mua sắm', level: 'a2', desc: 'Ask about prices, sizes, and make purchases in English.', duration: '10-12 min' },
            { id: 'directions', icon: '🗺️', name: 'Directions', vi: 'Chỉ đường', level: 'a2', desc: 'Ask for and give directions to navigate places.', duration: '8-10 min' },
            { id: 'hobbies', icon: '🎮', name: 'Hobbies', vi: 'Sở thích', level: 'a2', desc: 'Discuss your interests, hobbies, and free time activities.', duration: '8-10 min' },
            { id: 'daily-routine', icon: '⏰', name: 'Daily Routine', vi: 'Hoạt động hàng ngày', level: 'a2', desc: 'Describe your daily schedule and habitual activities.', duration: '8-10 min' },
            // B1
            { id: 'job-interview', icon: '💼', name: 'Job Interview', vi: 'Phỏng vấn xin việc', level: 'b1', desc: 'Prepare for job interviews with common questions and answers.', duration: '12-15 min' },
            { id: 'health', icon: '🏥', name: 'Health', vi: 'Sức khỏe', level: 'b1', desc: 'Describe symptoms and discuss health topics with a doctor.', duration: '10-12 min' },
            { id: 'travel', icon: '✈️', name: 'Travel', vi: 'Du lịch', level: 'b1', desc: 'Plan trips, book hotels, and handle travel situations.', duration: '12-15 min' },
            { id: 'school-life', icon: '🏫', name: 'School Life', vi: 'Cuộc sống học đường', level: 'b1', desc: 'Talk about education, courses, and campus experiences.', duration: '10-12 min' },
            { id: 'technology', icon: '💻', name: 'Technology', vi: 'Công nghệ', level: 'b1', desc: 'Discuss gadgets, apps, and the role of technology in daily life.', duration: '10-12 min' },
            { id: 'environment', icon: '🌿', name: 'Environment', vi: 'Môi trường', level: 'b1', desc: 'Talk about environmental issues and sustainability.', duration: '10-12 min' },
            // B2
            { id: 'ielts-part1', icon: '🎯', name: 'IELTS Part 1', vi: 'IELTS Phần 1', level: 'b2', desc: 'Practice personal questions on familiar topics for IELTS Speaking.', duration: '12-15 min' },
            { id: 'ielts-part2', icon: '📋', name: 'IELTS Part 2', vi: 'IELTS Phần 2', level: 'b2', desc: 'Master the long turn: describe, explain, and speculate.', duration: '15-18 min' },
            { id: 'ielts-part3', icon: '💬', name: 'IELTS Part 3', vi: 'IELTS Phần 3', level: 'b2', desc: 'Discuss abstract ideas and complex topics in depth.', duration: '15-18 min' },
            { id: 'business-meeting', icon: '📊', name: 'Business Meeting', vi: 'Họp kinh doanh', level: 'b2', desc: 'Lead and participate in professional meetings confidently.', duration: '12-15 min' },
            { id: 'presentation', icon: '🎤', name: 'Presentation', vi: 'Thuyết trình', level: 'b2', desc: 'Deliver clear, structured presentations in English.', duration: '12-15 min' },
            { id: 'debate', icon: '⚖️', name: 'Debate', vi: 'Tranh luận', level: 'b2', desc: 'Argue viewpoints persuasively and respond to counterarguments.', duration: '15-18 min' },
        ];

        const levelColors = { a1: 'badge-a1', a2: 'badge-a2', b1: 'badge-b1', b2: 'badge-b2' };
        const levelNames = { a1: 'A1 Beginner', a2: 'A2 Elementary', b1: 'B1 Intermediate', b2: 'B2 Upper-Intermediate' };

        let currentFilter = 'all';

        function renderRecommended() {
            const rec = topics.filter(t => t.level === 'b1').slice(0, 4);
            const container = document.getElementById('recScroll');
            container.innerHTML = rec.map(t => `
                <div class="rec-card" onclick="window.location.href='/room?topic=${t.id}'">
                    <div class="rec-emoji">${t.icon}</div>
                    <div class="rec-name">${t.name}</div>
                    <div class="rec-name-vi">${t.vi}</div>
                    <span class="rec-badge ${levelColors[t.level]}">${levelNames[t.level]}</span>
                    <div class="rec-meta">
                        <span class="rec-duration">⏱ ${t.duration}</span>
                        <button class="rec-btn" onclick="event.stopPropagation(); window.location.href='/room?topic=${t.id}'">Start</button>
                    </div>
                </div>
            `).join('');
        }

        function renderTopics(filter, search) {
            let filtered = topics;
            if (filter !== 'all') filtered = filtered.filter(t => t.level === filter);
            if (search) {
                const q = search.toLowerCase();
                filtered = filtered.filter(t => t.name.toLowerCase().includes(q) || t.vi.includes(q) || t.desc.toLowerCase().includes(q));
            }
            const grid = document.getElementById('topicsGrid');
            grid.innerHTML = filtered.map((t, i) => `
                <div class="topic-card fade-in" style="animation-delay: ${i * 0.05}s" onclick="window.location.href='/room?topic=${t.id}'">
                    <div class="topic-emoji">${t.icon}</div>
                    <span class="rec-badge ${levelColors[t.level]}">${levelNames[t.level]}</span>
                    <div class="topic-name">${t.name}</div>
                    <div class="topic-name-vi">${t.vi}</div>
                    <div class="topic-desc">${t.desc}</div>
                    <div class="topic-footer">
                        <span class="topic-duration">⏱ ${t.duration}</span>
                        <button class="topic-btn" onclick="event.stopPropagation(); window.location.href='/room?topic=${t.id}'">Start</button>
                    </div>
                </div>
            `).join('');
        }

        function setFilter(filter, el) {
            currentFilter = filter;
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            filterTopics();
        }

        function filterTopics() {
            const search = document.getElementById('searchInput').value;
            renderTopics(currentFilter, search);
        }

        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('open');
        }

        renderRecommended();
        renderTopics('all', '');
    </script>
</body>
</html>
