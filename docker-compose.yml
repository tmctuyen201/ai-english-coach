# =============================================================================
# AI English Coach — Docker Compose (Full Stack)
# =============================================================================
# Usage:
#   Development:  docker compose up -d
#   Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

version: "3.9"

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Primary Database
  # ---------------------------------------------------------------------------
  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: ai_coach_postgres
    environment:
      POSTGRES_DB: ai_english_coach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/alembic/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_english_coach"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai_coach_net

  # ---------------------------------------------------------------------------
  # Redis — Cache + Sessions + Rate Limiting
  # ---------------------------------------------------------------------------
  redis:
    <<: *common
    image: redis:7-alpine
    container_name: ai_coach_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ai_coach_net

  # ---------------------------------------------------------------------------
  # Qdrant — Vector Database (Knowledge Base + Embeddings)
  # ---------------------------------------------------------------------------
  qdrant:
    <<: *common
    image: qdrant/qdrant:v1.8.0
    container_name: ai_coach_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ai_coach_net

  # ---------------------------------------------------------------------------
  # MinIO — S3-Compatible Object Storage (Audio Files)
  # ---------------------------------------------------------------------------
  minio:
    <<: *common
    image: minio/minio:latest
    container_name: ai_coach_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ai_coach_net

  # ---------------------------------------------------------------------------
  # Backend — FastAPI Application
  # ---------------------------------------------------------------------------
  backend:
    <<: *common
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: ai_coach_backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - audio_cache:/app/audio_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai_coach_net

  # ---------------------------------------------------------------------------
  # Frontend — Next.js Web Application
  # ---------------------------------------------------------------------------
  frontend:
    <<: *common
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: ai_coach_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
      NEXT_PUBLIC_APP_NAME: "AI English Coach"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai_coach_net

  # ---------------------------------------------------------------------------
  # Nginx — Reverse Proxy + SSL Termination
  # ---------------------------------------------------------------------------
  nginx:
    <<: *common
    image: nginx:alpine
    container_name: ai_coach_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - ai_coach_net

  # ---------------------------------------------------------------------------
  # Celery Worker — Background Tasks (Grammar cache, Analytics, Reports)
  # ---------------------------------------------------------------------------
  celery_worker:
    <<: *common
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: ai_coach_celery
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai_coach_net

  # ---------------------------------------------------------------------------
  # Celery Beat — Scheduled Tasks (Reports, Cleanup)
  # ---------------------------------------------------------------------------
  celery_beat:
    <<: *common
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: ai_coach_celery_beat
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai_coach_net

  # ---------------------------------------------------------------------------
  # Flower — Celery Monitoring Dashboard
  # ---------------------------------------------------------------------------
  flower:
    <<: *common
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: ai_coach_flower
    command: celery -A app.core.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai_coach_net

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  audio_cache:
  nginx_logs:

networks:
  ai_coach_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
